<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AWARE AI</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading" class="loading hidden" aria-hidden="true">
    <div class="loading-inner">
      <div class="spinner"></div>
      <div class="loading-text">처리 중...</div>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">AWARE AI</div>
  </header>

  <main class="wrap">
    <!-- Screen 1: Upload -->
    <section id="screen-upload" class="screen">
      <div class="card">
        <div class="photo-frame">
          <video id="camera" class="photo hidden" autoplay playsinline muted></video>
          <canvas id="camera-canvas" class="hidden"></canvas>

          <img id="preview-upload" alt="미리보기" class="photo hidden" />
          <div id="placeholder" class="placeholder">사진을 선택하거나 카메라로 촬영해 주세요</div>
        </div>

        <div class="controls">
          <div class="grid2">
            <input id="name" class="input" placeholder="이름 (예: 예준)" maxlength="20" />

            <input id="age" class="input" placeholder="나이 (예: 17)" inputmode="numeric" />
          </div>

          <div class="gender">
            <button id="gender-m" type="button" class="seg">남</button>
            <button id="gender-f" type="button" class="seg">여</button>
          </div>
          <div class="hint">※ 중성적인 인상도 정확하게 반영될 수 있게 참고값으로만 사용돼요.</div>

          <div class="row">
            <input id="file" type="file" accept="image/*" class="file" />
          </div>

          <div class="row">
            <button id="btn-camera-start" class="btn ghost" type="button">카메라로 촬영</button>
          </div>

          <div id="camera-actions" class="row hidden">
            <button id="btn-camera-capture" class="btn primary" type="button">촬영하기</button>
            <button id="btn-camera-stop" class="btn ghost" type="button">카메라 끄기</button>
          </div>

          <button id="btn-analyze" class="btn primary" disabled>이 상태로 진단받기</button>
        </div>
      </div>
    </section>

    <!-- Screen 2: Result -->
    <section id="screen-result" class="screen hidden">
      <div class="card">
        <div class="photo-frame">
          <img id="preview-result" class="photo" alt="원본" />
        </div>

        <div class="result">
          <div class="title" id="result-title">OOO님의 결과</div>
          <div class="score" id="result-score">- / 10 점</div>
          <div class="vibe" id="result-vibe">-</div>
          <p class="reason" id="result-reason"></p>

          <div class="divider"></div>

          <div class="section-title">스타일링 팁</div>
          <ul id="tips" class="tips"></ul>

          <div class="divider"></div>

          <div class="section-title">추천 스타일 선택</div>
          <div id="options" class="options"></div>

          <!-- ✅ 버튼 간격/정렬 개선 -->
          <div class="btn-stack">
            <button id="btn-go-styled" class="btn primary">스타일링 적용 이미지 생성하기</button>
            <button id="btn-view-generated" class="btn ghost">생성이미지 보기</button>
            <button id="btn-back-upload" class="btn ghost">처음부터 다시하기</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Screen 3: Styled -->
    <section id="screen-styled" class="screen hidden">
      <div class="card">
        <div class="photo-frame">
          <img id="preview-styled" class="photo" alt="스타일링 결과" />
        </div>

        <div class="styled-panel">
          <div class="section-title">생성된 스타일링</div>
          <div id="thumbs" class="thumbs"></div>

          <div class="custom">
            <input id="custom-prompt" class="input" placeholder="원하는 스타일을 자연어로 입력 (예: 검은 뿔테안경, 시스루펌, 오버핏)" />
            <button id="btn-custom" class="btn primary">이대로 다시 생성</button>
          </div>

          <div class="btn-stack">
            <button id="btn-back-result" class="btn ghost">평가 화면으로 돌아가기</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
