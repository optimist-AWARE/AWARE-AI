<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="AI 기반 퍼스널 스타일링 분석 서비스. 사진을 업로드하면 동물상 진단, 스타일 점수, 맞춤 스타일링 팁과 AI 스타일링 이미지를 제공합니다." />
  <meta property="og:title" content="AWARE AI - AI 퍼스널 스타일링" />
  <meta property="og:description" content="사진 한 장으로 나만의 스타일을 찾아보세요. AI가 동물상 진단부터 스타일링 추천까지 제공합니다." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <title>AWARE AI</title>
  <link rel="stylesheet" href="./styles.css?v=6" />
</head>
<body>
  <!-- Loading Overlay -->
  <div id="loading" class="loading hidden" aria-hidden="true">
    <div class="loading-inner">
      <div class="spinner"></div>
      <div class="loading-text">처리 중...</div>
    </div>
  </div>

  <header class="topbar">
    <h1 class="brand">AWARE AI</h1>
  </header>

  <main class="wrap">
    <!-- Screen 1: Upload -->
    <section id="screen-upload" class="screen">
      <div class="card">
        <div class="photo-frame">
          <video id="camera" class="photo hidden" autoplay playsinline muted></video>
          <canvas id="camera-canvas" class="hidden"></canvas>

          <img id="preview-upload" alt="미리보기" class="photo hidden" />
          <div id="placeholder" class="placeholder">사진을 선택하거나 카메라로 촬영해 주세요</div>
        </div>

        <div class="controls">
          <div class="grid2">
            <input id="name" class="input" placeholder="이름 (예: 예준)" maxlength="20" />

            <input id="age" class="input" placeholder="나이 (예: 17)" inputmode="numeric" />
          </div>

          <input id="email" class="input" type="email" placeholder="결과 받을 이메일 주소 (선택)" />
          <div class="hint">※ 입력하시면 분석 결과를 해당 이메일로 보내드립니다.</div>

          <div class="gender">
            <button id="gender-m" type="button" class="seg">남</button>
            <button id="gender-f" type="button" class="seg">여</button>
          </div>
          <div class="hint">※ 중성적인 인상도 정확하게 반영될 수 있도록 참고용으로만 사용됩니다.</div>

          <div class="row">
            <input id="file" type="file" accept="image/*" class="file-hidden" aria-label="사진 파일 선택" />
            <label for="file" class="file-label">
              <span class="file-label-icon">&#x1F4F7;</span>
              <span id="file-name-display">사진 선택하기</span>
            </label>
          </div>

          <div class="row">
            <button id="btn-camera-start" class="btn ghost" type="button">카메라로 촬영</button>
          </div>

          <div id="camera-actions" class="row hidden">
            <button id="btn-camera-capture" class="btn primary" type="button">촬영하기</button>
            <button id="btn-camera-stop" class="btn ghost" type="button">카메라 끄기</button>
          </div>

          <button id="btn-analyze" class="btn primary" disabled>이 상태로 진단받기</button>
        </div>
      </div>
    </section>

    <!-- Screen 2: Result -->
    <section id="screen-result" class="screen hidden">
      <div class="card">
        <div class="photo-frame">
          <img id="preview-result" class="photo" alt="원본" />
        </div>

        <div class="result">
          <div class="title" id="result-title">OOO님의 결과</div>
          <div class="score" id="result-score">- (10점 만점)</div>
          <div class="vibe" id="result-vibe">-</div>
          <p class="reason" id="result-reason"></p>

          <div class="divider"></div>

          <div class="section-title">스타일링 팁</div>
          <ul id="tips" class="tips"></ul>

          <div class="tip-apply">
            <input id="tip-prompt" class="input" placeholder="팁을 참고해 원하는 스타일 직접 입력 (예: 시스루펌, 검은 뿔테안경)" />
            <button id="btn-tip-apply" class="btn primary">팁 적용해보기</button>
          </div>

          <!-- 신규: 쇼핑 추천 섹션 -->
          <div id="shopping-section" class="shopping-section"></div>

          <div class="divider"></div>

          <div class="section-title">추천 스타일 선택</div>
          <div id="options" class="options"></div>

          <!-- 버튼 -->
          <div class="btn-stack">
            <button id="btn-view-generated" class="btn ghost">생성이미지 보기</button>
            <button id="btn-send-email" class="btn ghost">이메일로 결과 받기</button>
            <button id="btn-back-upload" class="btn ghost">처음부터 다시하기</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Screen 3: Styled -->
    <section id="screen-styled" class="screen hidden">
      <div class="card">
        <div class="photo-frame">
          <img id="preview-styled" class="photo hidden" alt="스타일링 결과" />
          <div id="styled-placeholder" class="placeholder">
            <div class="styled-placeholder-icon">&#x1f3a8;</div>
            스타일을 선택하면 여기에 결과가 표시됩니다
          </div>
        </div>
        <div id="styled-desc" class="styled-desc"></div>

        <div class="styled-panel">
          <div class="section-title">생성된 스타일링</div>
          <div id="thumbs" class="thumbs"></div>

          <!-- 기준 이미지 선택 -->
          <div class="section-title" style="margin-top:16px;">기준 이미지</div>
          <div class="gender">
            <button id="base-original" type="button" class="seg active">원본 사진</button>
            <button id="base-current" type="button" class="seg">현재 이미지</button>
          </div>

          <!-- 변경 대상 카테고리 -->
          <div class="section-title" style="margin-top:14px;">변경 대상 선택 <span class="hint" style="font-weight:400;margin-top:0;">(복수 선택 가능)</span></div>
          <div class="cat-tags" id="cat-tags" role="group" aria-label="변경 대상 선택">
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="헤어스타일">헤어스타일</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="상의">상의</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="하의">하의</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="아우터">아우터</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="신발">신발</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="악세사리">악세사리</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="안경">안경</button>
            <button class="cat-tag" type="button" role="checkbox" aria-checked="false" data-cat="메이크업">메이크업</button>
          </div>

          <!-- 스타일 설명 입력 + 생성 -->
          <div class="custom">
            <input id="custom-prompt" class="input" placeholder="구체적인 스타일 설명 (예: 웨이비 중단발, 화이트 오버핏 셔츠)" />
            <button id="btn-custom" class="btn primary">생성</button>
          </div>

          <div class="btn-stack">
            <button id="btn-back-result" class="btn ghost">평가 화면으로 돌아가기</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="./app.js?v=7"></script>
</body>
</html>
